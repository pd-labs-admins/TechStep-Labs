annotations: []
smart_annotations: []
nodes:
  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          hostname dev1
          !
          no ip domain lookup
          !
          interface Ethernet0/0
           shutdown
          !
          interface Ethernet0/1
           ip address 10.0.0.1 255.255.255.0
           no shutdown
          !
          line con 0
           exec-timeout 300 0
           privilege level 15
           logging synchronous
           length 0
           stopbits 1
          !
          line vty 0 4
           exec-timeout 300 0
           privilege level 15
           logging synchronous
           no login
           length 0
           transport input all
          !
          end
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n0
    image_definition: null
    label: dev1
    node_definition: iol-xe
    parameters: {}
    priority: null
    pyats:
      username: null
      password: null
      enable_password: null
    ram: null
    tags: []
    x: 160
    y: 0
    interfaces:
      - id: i0
        label: Loopback0
        mac_address: null
        type: loopback
      - id: i1
        label: Ethernet0/0
        mac_address: null
        type: physical
        slot: 0
      - id: i2
        label: Ethernet0/1
        mac_address: null
        type: physical
        slot: 1
      - id: i3
        label: Ethernet0/2
        mac_address: null
        type: physical
        slot: 2
      - id: i4
        label: Ethernet0/3
        mac_address: null
        type: physical
        slot: 3
  - boot_disk_size: null
    configuration:
      - name: node.cfg
        content: |-
          # this is a shell script which will be sourced at boot
          hostname dev99
          # configurable user account
          USERNAME=cisco
          PASSWORD=cisco

          cat << EOF > /etc/network/interfaces
          auto lo
          iface lo inet loopback

          auto eth0
          iface eth0 inet static
              address 10.0.0.99
              netmask 255.255.255.0
              gateway 10.0.0.1
          EOF
          rc-service networking restart

          dd if=/dev/zero of=/var/sample.bin bs=1M count=5
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n1
    image_definition: null
    label: dev99
    node_definition: alpine
    parameters: {}
    priority: null
    pyats:
      username: null
      password: null
      enable_password: null
    ram: null
    tags: []
    x: 0
    y: 0
    interfaces:
      - id: i0
        label: eth0
        mac_address: null
        type: physical
        slot: 0
links:
  - id: l0
    n1: n0
    n2: n1
    i1: i2
    i2: i0
    conditioning: {}
    label: dev1-Ethernet0/1<->dev99-eth0
