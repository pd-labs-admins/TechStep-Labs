  - boot_disk_size: null
    configuration:
      - name: day0-config
        content: |-
          hostname dev2
          !
          enable password Passw0rd!
          !
          interface Management0/0
           shutdown
          !
          interface GigabitEthernet0/0
           no shutdown
           nameif inside
           security-level 100
           ip address 192.168.0.254 255.255.255.0
          !
          interface GigabitEthernet0/1
           no shutdown
           nameif outside
           security-level 0
           ip address 100.0.0.254 255.255.255.0
          !
          clock timezone JST 9
          !
          object network OBJ_LAN
           subnet 192.168.0.0 255.255.255.0
          object network OBJ_192.168.0.12_PUBLIC
           host 100.0.0.12
          object network OBJ_192.168.0.12
           host 192.168.0.12
          !
          access-group outside-to-inside in interface outside
          access-list outside-to-inside extended permit ip any host 192.168.0.12
          !
          no pager
          !
          logging enable
          logging timestamp
          logging buffer-size 512000
          logging buffered debugging
          !
          object network OBJ_LAN
           nat (inside,outside) dynamic interface
          object network OBJ_192.168.0.12
           nat (inside,outside) static OBJ_192.168.0.12_PUBLIC
          !
          aaa authentication ssh console LOCAL
          aaa authentication telnet console LOCAL
          !
          telnet 0.0.0.0 0.0.0.0 management
          telnet timeout 60
          !
          ssh timeout 60
          ssh version 2
          ssh key-exchange group dh-group14-sha256
          ssh 0.0.0.0 0.0.0.0 management
          !
          console timeout 60
          !
          crypto key generate rsa modulus 2048 noconfirm
          !
          fixup protocol icmp
          !
          policy-map global_policy
           class inspection_default
            inspect icmp
          !
          no service call-home
          clear config call-home
          !
          end
