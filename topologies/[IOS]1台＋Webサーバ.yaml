nodes:
  - boot_disk_size: null
    configuration:
      - name: boot.sh
        content: |-
          # Insert more commands here
          # ip address add dev eth1 10.0.0.1/24
          # ip link set dev eth1 up
          #
          # keep the next line to indicate that the machine is ready
          ip address add dev eth0 10.0.0.99/24
          ip link set dev eth0 up
          echo "Hello, CML!" > /usr/share/nginx/html/index.html
          dd if=/dev/zero of=/usr/share/nginx/html/sample.bin bs=1M count=5
          echo "READY" >/dev/console
          exit 0
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n0
    image_definition: null
    label: dev99
    node_definition: nginx
    parameters: {}
    priority: null
