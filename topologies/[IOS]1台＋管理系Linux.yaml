nodes:
  - boot_disk_size: null
    configuration:
      - name: ios_config.txt
        content: |-
          hostname dev1
          !
          no ip domain lookup
          !
          interface Ethernet0/0
           ip address 10.0.0.1 255.255.255.0
           no shutdown
          !
          interface Ethernet0/1
           shutdown
          !
          interface Ethernet0/2
           shutdown
          !
          interface Ethernet0/3
           shutdown
          !
          line con 0
           exec-timeout 300 0
           privilege level 15
           logging synchronous
           length 0
           stopbits 1
          !
          line vty 0 4
           exec-timeout 300 0
           privilege level 15
           logging synchronous
           no login
           length 0
           transport input all
          !
          end
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    id: n0
    image_definition: null
    label: dev1
    node_definition: iol-xe
    parameters: {}
    priority: null
    pyats:
      username: null
      password: null
      enable_password: null
    ram: null
    tags: []
    x: 160
    y: 0
    interfaces:
      - id: i0
        label: Loopback0
        mac_address: null
        type: loopback
      - id: i1
        label: Ethernet0/0
        mac_address: null
        type: physical
        slot: 0
      - id: i2
