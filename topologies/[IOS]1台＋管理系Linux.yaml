        content: |-
          #cloud-config
          hostname: dev99
          manage_etc_hosts: True
          system_info:
            default_user:
              name: cisco
          password: cisco
          chpasswd: { expire: False }
          ssh_pwauth: True
          ssh_authorized_keys:
            - your-ssh-pubkey-line-goes-here
      - name: network-config
        content: |-
          version: 2
          ethernets:
            ens2:
              addresses:
                - 10.0.0.99/24
              dhcp4: false
