  - boot_disk_size: null
    configuration:
      - name: clients.conf
        content: |-
          client ALL-NETWORK {
              ipaddr = *
              secret = SharedSecretKey-123
              require_message_authenticator = no
              nas_type = other
          }
      - name: radiusd.conf
        content: |-
          #
          # FreeRADIUS Version 3.2.7 を想定
          #

          #
          # 変数
          #
          # mods-enabled/files から参照される変数の定義
          raddbdir = /etc/freeradius/3.0
          confdir = ${raddbdir}
          modconfdir = ${confdir}/mods-config

          #
          # ログ
          #
          log {
              #  標準出力 (stdout)にログを出力
              destination = stdout

              # stderr と stdout に出力される重要メッセージをハイライト
              colourise = yes

              # リクエストに含まれる User-Name の情報をログに記録
              stripped_names = yes

              # 全ての認証結果をログに記録
              auth = yes

              # 認証リクエストと共にパスワードを記録
              # auth_badpass - パスワードが拒否された場合に記録
              # auth_goodpass - パスワードが正しい場合に記録
              auth_badpass = yes
              auth_goodpass = yes
          }

          # NAD (Network Access Device)の情報を別ファイルに定義しているため読み込み
          $INCLUDE clients.conf

          #
          # モジュールの読み込み
          #
          modules {
              # ドキュメントの参考リンクは Version 4.0.0
              # 備考: モジュールの情報はReference Documentationのセクションに「4.0.0 Devel」から追加されている模様
              #
              # Files Module :: The FreeRADIUS project - Documentation
              # https://www.freeradius.org/documentation/freeradius-server/4.0.0/reference/raddb/mods-available/files.html
              $INCLUDE mods-enabled/files

              # PAP Module :: The FreeRADIUS project - Documentation
              # https://www.freeradius.org/documentation/freeradius-server/4.0.0/reference/raddb/mods-available/pap.html
              $INCLUDE mods-enabled/pap
          }

          #
          # Virutal Server
          #
          # モジュールとしては読み込まず、必要な設定のみを直書き
          #$INCLUDE sites-enabled/

          server default {
              # 認証リクエストを受け取る設定
              listen {
                  type = auth
                  ipaddr = *
                  port = 1812
              }

              # 認証要求パケットが届いた際の処理フロー
              authorize {
                  # users ファイルを検索
                  files

                  # 「NADから送られてきた User-Password」と「users ファイル内の Cleartext-Password」の比較準備
                  pap
              }

              # 実際にパスワードが正しいか検証するセクション
              authenticate {
                  # PAP認証の場合の処理
                  Auth-Type PAP {
                      pap
                  }
              }
          }
      - name: users
        content: |-
          raduser Cleartext-Password := "RadPassw0rd!"

          radadmin Cleartext-Password := "RadPassw0rd!"
              Cisco-AVPair = "shell:priv-lvl=15"
      - name: boot.sh
        content: |-
          # insert more commands here
          ip addr flush dev eth0
          ip address add dev eth0 10.0.0.201/24
          ip link set dev eth0 up

          echo '==== freeradius -v ====' > /dev/console
          freeradius -v > /dev/console
          echo '=======================' > /dev/console
          #
          # keep the next line to indicate that the machine is ready
          echo "READY" >/dev/console
          exit 0
      - name: mounts
        content: |-
          # Can map a volume with radius server data into the container
          # it. By default, only type=volume is allowed, see
          # /etc/default/docker-shim.env
          # Note: Volumes must exist to be usable and can be created via
          # "docker volume create radiusdata" where radiusdata is the name
          #
          # type=volume,source=radiusdata,target=/var/somedir
